name: Sync CMS Fallback

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - cms_content_saved
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-cms-fallback
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync CMS content into static fallback
        run: node scripts/sync-cms-fallback.mjs

      - name: Commit synced fallback
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No CMS fallback changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html content/site.json
          git commit -m "Sync CMS fallback content"
          git push
