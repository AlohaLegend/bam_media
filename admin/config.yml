backend:
  name: github
  repo: AlohaLegend/bam_media
  branch: main
  auth_methods: [token]

site_url: https://bammedia.us
display_url: https://bammedia.us
logo_url: /assets/favicon.svg
media_folder: assets/uploads
public_folder: /assets/uploads

editor:
  preview: false

commit_messages:
  update: "Update BAM website content"
  create: "Create BAM website content"
  delete: "Delete BAM website content"
  uploadMedia: "Upload BAM media"
  deleteMedia: "Delete BAM media"

collections:
  - name: site
    label: BAM Website
    description: Safe homepage fields for normal copy, stats, contact, and social updates.
    files:
      - name: homepage
        label: Homepage Quick Edits
        file: content/site.json
        format: json
        preview_path: /
        fields:
          - label: SEO
            name: seo
            widget: object
            collapsed: false
            hint: Browser/search text. This is not the big hero headline.
            fields:
              - label: Browser Title
                name: title
                widget: string
                hint: Shows in the browser tab and search results. Keep BAM Media Group in the title.
              - label: Search Description
                name: description
                widget: text
                hint: One plain-language sentence for Google and link previews.

          - label: Hero
            name: hero
            widget: object
            collapsed: false
            hint: First screen of the homepage. Short copy wins here.
            fields:
              - label: Eyebrow
                name: eyebrow
                widget: string
                hint: Tiny all-caps line above the headline.
              - label: Headline
                name: title
                widget: string
                hint: Big homepage headline. Keep it punchy so mobile still feels sharp.
              - label: Intro Copy
                name: copy
                widget: text
                hint: One short sentence is ideal. Two is the danger zone.
              - label: Primary Button
                name: primaryCta
                widget: string
                hint: Main CTA. Jake liked "Start the conversation".
              - label: Secondary Button
                name: secondaryCta
                widget: string
                hint: Secondary CTA that scrolls users into the page.

          - label: Demand Board
            name: signals
            widget: list
            summary: "{{fields.value}} - {{fields.label}}"
            min: 3
            max: 3
            allow_add: false
            collapsed: false
            hint: The three stat cards in the hero. Keep these synced with Receipts unless there is a good reason.
            fields:
              - label: Big Number
                name: value
                widget: string
                hint: Example, 10%+ or 5B+.
              - label: Small Label
                name: label
                widget: string
                hint: Keep labels short so they fit on phones.

          - label: Receipts
            name: proof
            widget: object
            collapsed: false
            hint: Proof section lower on the homepage.
            fields:
              - label: Kicker
                name: kicker
                widget: string
                hint: Small label above the section headline.
              - label: Headline
                name: title
                widget: string
                hint: Keep this confident and concise.
              - label: Receipt Cards
                name: metrics
                widget: list
                summary: "{{fields.value}} - {{fields.label}}"
                min: 3
                max: 3
                allow_add: false
                collapsed: false
                hint: These are the three proof cards. They usually mirror the Demand Board stats.
                fields:
                  - label: Big Number
                    name: value
                    widget: string
                  - label: Small Label
                    name: label
                    widget: string

          - label: Direct Line
            name: contact
            widget: object
            collapsed: false
            hint: Bottom contact section.
            fields:
              - label: Eyebrow
                name: eyebrow
                widget: string
              - label: Headline
                name: title
                widget: text
                hint: Keep this focused on the next launch, opening, or growth push.
              - label: Button Text
                name: cta
                widget: string
              - label: Email
                name: email
                widget: string
                pattern:
                  - '^[^@\s]+@[^@\s]+\.[^@\s]+$'
                  - Use a valid email address.

          - label: Social Links
            name: social
            widget: object
            collapsed: false
            hint: Footer social buttons.
            fields:
              - label: Instagram URL
                name: instagram
                widget: string
                pattern:
                  - '^https://'
                  - Use the full https:// link.
              - label: LinkedIn URL
                name: linkedin
                widget: string
                pattern:
                  - '^https://'
                  - Use the full https:// link.
